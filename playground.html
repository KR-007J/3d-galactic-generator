<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Particle Universe | Playground</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                "on-tertiary-fixed": "#1f0052",
                "error-dim": "#d7383b",

                "surface-container-high": "#1d1d33",

                "inverse-on-surface": "#545366",
                "on-tertiary-fixed-variant": "#4600a8",
                "on-primary-fixed-variant": "#005e64",
                "tertiary": "#ac8aff",

                "primary-fixed-dim": "#00deec",
                "surface": "#0c0c1d",

                "surface-container-lowest": "#000000"

              fontFamily: {
                "headline": ["Space Grotesk"],
                "body": ["Inter"],
                "label": ["Inter"]
              },
              borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
            },
          },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .particle-grid {
            background-image: linear-gradient(rgba(143, 245, 255, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(143, 245, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .ion-gradient-text {
            background: linear-gradient(135deg, #8ff5ff 0%, #ff51fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .ion-gradient-bg {
            background: linear-gradient(135deg, #8ff5ff 0%, #ff51fa 100%);
        }
    </style>
</head>
<body class="bg-surface-dim text-on-surface font-body selection:bg-primary/30">
<!-- TopNavBar -->
<nav class="flex justify-between items-center w-full z-50 fixed top-0 w-full px-6 py-4 bg-cyan-950/30 backdrop-blur-lg border-b border-cyan-400/20 shadow-[0_0_20px_rgba(0,240,255,0.1)]">
<div class="flex items-center gap-2">
<span class="text-2xl font-black bg-gradient-to-r from-cyan-400 to-magenta-500 bg-clip-text text-transparent font-headline">✦ Particle Universe</span>
</div>
<div class="hidden md:flex items-center gap-10 font-headline uppercase tracking-widest text-sm">
<a class="text-cyan-300 border-b-2 border-cyan-400 pb-1 hover:text-cyan-200 transition-all" href="#">Editor</a>
<a class="text-cyan-100/60 hover:text-cyan-200 hover:bg-white/5 transition-all px-2 py-1 rounded" href="#">Library</a>
<a class="text-cyan-100/60 hover:text-cyan-200 hover:bg-white/5 transition-all px-2 py-1 rounded" href="#">Assets</a>
<a class="text-cyan-100/60 hover:text-cyan-200 hover:bg-white/5 transition-all px-2 py-1 rounded" href="#">Community</a>
</div>
<button class="bg-primary text-on-primary-fixed font-headline font-bold uppercase tracking-tighter px-6 py-2 rounded-full hover:shadow-[0_0_15px_rgba(143,245,255,0.5)] transition-all active:scale-95">
            Export
        </button>
</nav>
<!-- Main Viewport Area -->
<main class="relative h-screen w-full flex overflow-hidden">
<!-- 3D Canvas Mockup (75% Width) -->
<div class="w-full md:w-3/4 h-full relative overflow-hidden bg-surface-container-lowest">
<div class="absolute inset-0 particle-grid opacity-30"></div>
<!-- Simulated Galaxy Render -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="relative w-full h-full max-w-4xl max-h-4xl flex items-center justify-center scale-110 lg:scale-125">
<img alt="Galaxy render" class="w-full h-full object-contain opacity-80 mix-blend-screen animate-pulse-slow" data-alt="Cinematic 3D render of a swirling spiral galaxy with glowing electric cyan and neon magenta particles against a deep black cosmic void" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAlWGFLhGQqPNiFk0S9-a6pjrP0Aw3mDMrZSGxRXfE9uriV7OY79olLI4A38wREikAivlRYUSdHx_SnYOnFeeUKQiAMLOahzigef2r7XZD3sP85dIE60zngprneFYavLHFG5fBqr_3Tga9N3ulpVmjPkdn4a-3ah-0Z1UO4wSvPRgXkRGcHFdZqWP3rTepuwWBpqLRhb6Xqp2jDT-YUzend6GytkbrAyzkBvQuiHB5wZiBVpsqKkQWO2Plm-qK4rD8BbqYd0E4QdIPU"/>
<!-- Additional depth layers -->
<div class="absolute inset-0 bg-gradient-to-t from-surface-dim via-transparent to-surface-dim pointer-events-none"></div>
</div>
</div>
<!-- HUD Overlay (Top Left) -->
<div class="absolute top-28 left-8 flex flex-col gap-1">
<div class="flex items-center gap-4 bg-surface-container-high/40 backdrop-blur-md px-4 py-2 rounded-lg border-l-2 border-primary/50">
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-widest text-primary/70 font-headline font-bold">System Status</span>
<div class="flex gap-4 font-headline text-sm font-medium">
<span>FPS: <span class="text-primary">60</span></span>
<span class="opacity-30">|</span>
<span>PARTICLES: <span class="text-primary">12,450</span></span>
<span class="opacity-30">|</span>
<span>MODE: <span class="text-secondary">GALAXY</span></span>
</div>
</div>
</div>
</div>
<!-- Floating Control Bar (Bottom Center) -->
<div class="fixed bottom-8 left-[37.5%] -translate-x-1/2 flex gap-6 items-center z-50 bg-zinc-900/60 backdrop-blur-md border border-white/10 rounded-full px-8 py-3 shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
<button class="text-white/70 hover:scale-110 hover:text-cyan-300 transition-transform active:scale-90 flex flex-col items-center">
<span class="material-symbols-outlined text-2xl" data-icon="play_arrow">play_arrow</span>
</button>
<button class="text-magenta-400 hover:scale-110 transition-transform active:scale-90 flex flex-col items-center">
<span class="material-symbols-outlined text-2xl" data-icon="pause" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="text-white/70 hover:scale-110 hover:text-cyan-300 transition-transform active:scale-90 flex flex-col items-center">
<span class="material-symbols-outlined text-2xl" data-icon="replay">replay</span>
</button>
<div class="w-[1px] h-6 bg-white/10 mx-2"></div>
<button class="text-white/70 hover:scale-110 hover:text-cyan-300 transition-transform active:scale-90 flex flex-col items-center">
<span class="material-symbols-outlined text-2xl" data-icon="photo_camera">photo_camera</span>
</button>
<button class="text-white/70 hover:scale-110 hover:text-cyan-300 transition-transform active:scale-90 flex flex-col items-center">
<span class="material-symbols-outlined text-2xl" data-icon="fullscreen">fullscreen</span>
</button>
<button class="text-white/70 hover:scale-110 hover:text-magenta-400 transition-transform active:scale-90 flex flex-col items-center">
<span class="material-symbols-outlined text-2xl" data-icon="fiber_manual_record" style="font-variation-settings: 'FILL' 1;">fiber_manual_record</span>
</button>
</div>
</div>
<!-- Right Sidebar (SideNavBar) -->
<aside class="hidden md:flex flex-col h-full z-40 fixed right-4 top-24 bottom-4 w-80 rounded-3xl bg-slate-900/40 backdrop-blur-xl shadow-2xl shadow-cyan-900/20 overflow-hidden border border-cyan-400/10">
<!-- Header -->
<div class="p-6 border-b border-white/5">
<h2 class="text-cyan-400 font-black font-headline uppercase tracking-widest text-lg">Control Panel</h2>
<p class="text-slate-400 font-headline text-[10px] uppercase font-bold tracking-wider">System Parameters</p>
</div>
<div class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-8 pb-32">
<!-- Mode Section -->
<section>
<label class="text-slate-400 font-headline text-xs font-bold uppercase tracking-widest block mb-4">Simulation Mode</label>
<div class="grid grid-cols-2 gap-2">
<button class="px-3 py-2 text-[10px] font-bold uppercase bg-surface-container-high/40 text-slate-400 border border-transparent rounded-lg hover:border-primary/30 transition-all">Rain</button>
<button class="px-3 py-2 text-[10px] font-bold uppercase bg-surface-container-high/40 text-slate-400 border border-transparent rounded-lg hover:border-primary/30 transition-all">Explosion</button>
<button class="px-3 py-2 text-[10px] font-bold uppercase bg-surface-container-high/40 text-slate-400 border border-transparent rounded-lg hover:border-primary/30 transition-all">Orbit</button>
<button class="px-3 py-2 text-[10px] font-bold uppercase bg-cyan-400/20 text-cyan-300 border border-cyan-400/40 rounded-lg shadow-[0_0_15px_rgba(0,238,252,0.15)]">Galaxy</button>
<button class="px-3 py-2 text-[10px] font-bold uppercase bg-surface-container-high/40 text-slate-400 border border-transparent rounded-lg hover:border-primary/30 transition-all">Vortex</button>
<button class="px-3 py-2 text-[10px] font-bold uppercase bg-surface-container-high/40 text-slate-400 border border-transparent rounded-lg hover:border-primary/30 transition-all">Custom</button>
</div>
</section>
<!-- Quick Controls -->
<section class="space-y-6">
<label class="text-slate-400 font-headline text-xs font-bold uppercase tracking-widest block">Quick Controls</label>
<div class="space-y-2">
<div class="flex justify-between text-[10px] font-bold text-on-surface-variant uppercase">
<span>Count</span>
<span class="text-primary">12,450</span>
</div>
<input class="w-full h-1 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-primary" type="range" value="65"/>
</div>
<div class="space-y-2">
<div class="flex justify-between text-[10px] font-bold text-on-surface-variant uppercase">
<span>Speed</span>
<span class="text-primary">0.8x</span>
</div>
<input class="w-full h-1 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-primary" type="range" value="40"/>
</div>
<div class="space-y-2">
<div class="flex justify-between text-[10px] font-bold text-on-surface-variant uppercase">
<span>Size</span>
<span class="text-primary">2.5px</span>
</div>
<input class="w-full h-1 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-primary" type="range" value="25"/>
</div>
<div class="space-y-2">
<div class="flex justify-between text-[10px] font-bold text-on-surface-variant uppercase">
<span>Lifetime</span>
<span class="text-primary">3.0s</span>
</div>
<input class="w-full h-1 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-primary" type="range" value="50"/>
</div>
</section>
<!-- Colors Section -->
<section>
<label class="text-slate-400 font-headline text-xs font-bold uppercase tracking-widest block mb-4">Color Palette</label>
<div class="flex items-center justify-between gap-1">
<button class="w-8 h-8 rounded-full bg-primary border-2 border-white/20 shadow-[0_0_10px_#8ff5ff] ring-2 ring-primary ring-offset-2 ring-offset-slate-900"></button>
<button class="w-8 h-8 rounded-full bg-secondary border-2 border-white/20 shadow-[0_0_10px_#ff51fa] ring-2 ring-secondary ring-offset-2 ring-offset-slate-900"></button>
<button class="w-8 h-8 rounded-full bg-[#7000ff] border border-white/10 opacity-60 hover:opacity-100 transition-opacity"></button>
<button class="w-8 h-8 rounded-full bg-[#00ff95] border border-white/10 opacity-60 hover:opacity-100 transition-opacity"></button>
<button class="w-8 h-8 rounded-full bg-[#ffd700] border border-white/10 opacity-60 hover:opacity-100 transition-opacity"></button>
<button class="w-8 h-8 rounded-full bg-white border border-white/10 opacity-60 hover:opacity-100 transition-opacity"></button>
</div>
</section>
<!-- Physics Section -->
<section>
<label class="text-slate-400 font-headline text-xs font-bold uppercase tracking-widest block mb-4">Physics Engine</label>
<div class="space-y-3">
<div class="flex items-center justify-between bg-surface-container/50 p-3 rounded-xl border border-white/5">
<span class="text-[10px] font-bold uppercase text-on-surface-variant">Gravity</span>
<div class="w-10 h-5 bg-primary/20 rounded-full relative p-1 cursor-pointer">
<div class="w-3 h-3 bg-primary rounded-full absolute right-1"></div>
</div>
</div>
<div class="flex items-center justify-between bg-surface-container/50 p-3 rounded-xl border border-white/5">
<span class="text-[10px] font-bold uppercase text-on-surface-variant">Bounce</span>
<div class="w-10 h-5 bg-white/10 rounded-full relative p-1 cursor-pointer">
<div class="w-3 h-3 bg-slate-400 rounded-full absolute left-1"></div>
</div>
</div>
<div class="flex items-center justify-between bg-surface-container/50 p-3 rounded-xl border border-white/5">
<span class="text-[10px] font-bold uppercase text-on-surface-variant">Wind Impact</span>
<div class="w-10 h-5 bg-primary/20 rounded-full relative p-1 cursor-pointer">
<div class="w-3 h-3 bg-primary rounded-full absolute right-1"></div>
</div>
</div>
<div class="flex items-center justify-between bg-surface-container/50 p-3 rounded-xl border border-white/5">
<span class="text-[10px] font-bold uppercase text-on-surface-variant">Turbulence</span>
<div class="w-10 h-5 bg-white/10 rounded-full relative p-1 cursor-pointer">
<div class="w-3 h-3 bg-slate-400 rounded-full absolute left-1"></div>
</div>
</div>
</div>
</section>
</div>
<!-- Sidebar Footer -->
<div class="absolute bottom-0 left-0 right-0 p-6 bg-slate-900/80 backdrop-blur-xl border-t border-white/5 grid grid-cols-2 gap-3">
<button class="px-2 py-3 border border-outline rounded-xl text-[10px] font-bold uppercase tracking-widest text-on-surface hover:bg-white/5 transition-colors">
                    Save Preset
                </button>
<button class="px-2 py-3 ion-gradient-bg rounded-xl text-[10px] font-bold uppercase tracking-widest text-on-primary-fixed shadow-[0_5px_15px_rgba(143,245,255,0.2)] hover:scale-105 transition-all">
                    Full Settings →
                </button>
</div>
</aside>
</main>
<!-- Background Ambient Glows -->
<div class="fixed top-[-20%] right-[-10%] w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] pointer-events-none z-0"></div>
<div class="fixed bottom-[-20%] left-[-10%] w-[600px] h-[600px] bg-secondary/5 rounded-full blur-[120px] pointer-events-none z-0"></div>
</body></html>
